<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EVV DOH Reporting Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial,sans-serif;max-width:1180px;margin:20px auto;padding:20px}
.card{border:1px solid #ddd;padding:14px;border-radius:8px;margin:14px 0}
label{display:block;margin:10px 0}
input,select{padding:6px;margin-left:6px}
button{padding:10px 16px;cursor:pointer}
table{border-collapse:collapse;width:100%;margin-top:18px}
th,td{border:1px solid #ccc;padding:8px;text-align:right}
th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
.good{color:#0a7a0a}.warn{color:#a15c00}.err{color:#b00020;font-weight:bold}
pre{background:#f7f7f7;padding:10px;overflow:auto;white-space:pre-wrap;font-size:12px}
.small{font-size:12px;color:#555}
</style>
</head>
<body>
<h2>EVV DOH Reporting Calculator v5</h2>
<p>Browser-only prototype. Your files stay on your computer.</p>

<div class="card">
<label>Contract Name <input id="contractName" value="Village Care Max"></label>
<label>Reporting Month
<select id="reportMonth">
<option value="1">January</option><option value="2">February</option><option value="3">March</option>
<option value="4" selected>April</option><option value="5">May</option><option value="6">June</option>
<option value="7">July</option><option value="8">August</option><option value="9">September</option>
<option value="10">October</option><option value="11">November</option><option value="12">December</option>
</select></label>
<label>Reporting Year <input id="reportYear" value="2026"></label>
</div>

<div class="card">
<label>1. Billing Visits CSV <input type="file" id="billingFile" accept=".csv"></label>
<label>2. EVV Compliance Detail Excel <input type="file" id="evvFile" accept=".xlsx,.xls"></label>
<label>3. Eligibility CSV <input type="file" id="eligFile" accept=".csv"></label>
<button id="generateBtn" type="button">Generate DOH Numbers</button>
</div>

<div id="messages"></div>
<div id="result"></div>

<script>
function norm(v){return String(v||"").trim().toLowerCase().replace(/\s+/g," ")}
function compact(v){return norm(v).replace(/[^a-z0-9]/g,"")}
function cleanId(v){return String(v||"").trim().toUpperCase().replace(/[^A-Z0-9]/g,"")}
function money(v){return Number(v||0).toLocaleString(undefined,{style:"currency",currency:"USD"})}
function cleanDate(v){
  if(v===null||v===undefined||v==="")return "";
  if(typeof v==="number"){const d=XLSX.SSF.parse_date_code(v); if(!d)return ""; return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`}
  if(v instanceof Date&&!isNaN(v))return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,"0")}-${String(v.getDate()).padStart(2,"0")}`;
  const s=String(v).trim(); const d=new Date(s);
  if(!isNaN(d))return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)){const parts=s.split(/[\/\s]/); return `${parts[2]}-${String(parts[0]).padStart(2,"0")}-${String(parts[1]).padStart(2,"0")}`}
  return s.slice(0,10)
}
function show(html){document.getElementById("messages").innerHTML=html}
function col(row,names){
  const keys=Object.keys(row||{})
  for(const name of names){let hit=keys.find(k=>norm(k)===norm(name)); if(hit)return hit}
  for(const name of names){let hit=keys.find(k=>compact(k)===compact(name)); if(hit)return hit}
  for(const name of names){let hit=keys.find(k=>norm(k).includes(norm(name))); if(hit)return hit}
  return null
}
function parseCSV(file){
  return new Promise((resolve,reject)=>Papa.parse(file,{header:true,skipEmptyLines:true,complete:r=>resolve(r.data),error:reject}))
}
async function parseExcelBestSheet(file){
  const buf=await file.arrayBuffer()
  const wb=XLSX.read(buf,{type:"array",cellDates:true})
  let best={score:-1,sheet:wb.SheetNames[0],headerIndex:0}
  for(const sheetName of wb.SheetNames){
    const ws=wb.Sheets[sheetName]
    const matrix=XLSX.utils.sheet_to_json(ws,{header:1,defval:""})
    for(let i=0;i<Math.min(matrix.length,50);i++){
      const joined=matrix[i].map(x=>norm(x)).join("|")
      let score=0
      if(joined.includes("patient name"))score+=5
      if(joined.includes("visit date"))score+=5
      if(joined.includes("admission id"))score+=4
      if(joined.includes("contract"))score+=3
      if(joined.includes("evv exception"))score+=3
      if(joined.includes("invoice number"))score+=2
      if(sheetName.toLowerCase().includes("detail"))score+=2
      if(score>best.score)best={score,sheet:sheetName,headerIndex:i}
    }
  }
  const ws=wb.Sheets[best.sheet]
  const data=XLSX.utils.sheet_to_json(ws,{range:best.headerIndex,defval:""})
  data.__sheetName=best.sheet
  data.__headerIndex=best.headerIndex+1
  return data
}
function isSelectedMonth(dateStr){
  const d=new Date(dateStr+"T00:00:00")
  const m=Number(reportMonth.value), y=Number(reportYear.value)
  return d.getFullYear()===y && (d.getMonth()+1)===m
}
function productFromPlan(planRaw){
  const p=String(planRaw||"").toUpperCase()
  if(p.includes("MAP") || p.includes("MEDICAID ADVANTAGE PLUS")) return "MAP"
  if(p.includes("PARTIAL") || p.includes("MLTC") || p.includes("LTC")) return "MLTCP"
  return ""
}
async function runCalc(){
 try{
  if(typeof Papa==="undefined"||typeof XLSX==="undefined")throw new Error("Required browser libraries did not load. Check internet/CDN access.")
  const bf=billingFile.files[0], ef=evvFile.files[0], gf=eligFile.files[0]
  if(!bf||!ef||!gf)throw new Error("Upload all three files first.")
  show("<p class='good'>Reading files...</p>")
  const billing=await parseCSV(bf)
  const evv=await parseExcelBestSheet(ef)
  const elig=await parseCSV(gf)
  if(!billing.length||!evv.length||!elig.length)throw new Error("One uploaded file appears empty.")

  const b0=billing[0], e0=evv[0], g0=elig[0]
  const billName=col(b0,["Patient Name","Patient"])
  const billMedicaid=col(b0,["Medicaid Number","Medicaid ID"])
  const billDate=col(b0,["Visit Date"])
  const billAmt=col(b0,["Total Amount","Paid Amount"])
  const billAdm=col(b0,["Admission ID"])
  const billInv=col(b0,["Invoice Number"])
  const eligName=col(g0,["Patient Name","Member Name","Client Name","Name"])
  const eligMedicaid=col(g0,["Medicaid Number","Medicaid ID"])
  const eligPlan=col(g0,["Insurance Plan Name 1","Plan Name","Insurance Plan Name","Payer Name","Benefit Plan","Contract Name"])
  const evvName=col(e0,["Patient Name","Patient","Consumer Name","Member Name","Client Name","Name"])
  const evvDate=col(e0,["Visit Date","Date of Service","Service Date","Date"])
  const evvAdm=col(e0,["Admission ID"])
  const evvInv=col(e0,["Invoice Number"])
  const evvContract=col(e0,["Contract","Primary Bill To"])
  const missing=[]
  if(!billName)missing.push("Billing: Patient Name")
  if(!billDate)missing.push("Billing: Visit Date")
  if(!billAmt)missing.push("Billing: Total Amount")
  if(!eligPlan)missing.push("Eligibility: Plan/Insurance Plan Name")
  if(!evvDate)missing.push("EVV: Visit Date")
  if(!evvName && !evvAdm)missing.push("EVV: Patient Name or Admission ID")
  if(missing.length)throw new Error("Could not identify: "+missing.join(", ")+"\n\nEVV sheet used: "+evv.__sheetName+", header row: "+evv.__headerIndex+"\nEVV columns found: "+Object.keys(e0).join(", "))

  const productByName={}, productByMedicaid={}
  elig.forEach(r=>{
    const product=productFromPlan(r[eligPlan])
    if(!product)return
    if(eligName && norm(r[eligName])) productByName[norm(r[eligName])]=product
    if(eligMedicaid && cleanId(r[eligMedicaid])) productByMedicaid[cleanId(r[eligMedicaid])]=product
  })

  const contractWanted=norm(contractName.value)
  const exByAdmDate=new Set(), exByNameDate=new Set(), exByInvDate=new Set()
  let evvRowsUsed=0, evvRowsSkippedContract=0
  evv.forEach(r=>{
    if(evvContract && contractWanted && norm(r[evvContract])!==contractWanted){evvRowsSkippedContract++; return}
    const date=cleanDate(r[evvDate])
    if(!date)return
    const adm=evvAdm ? cleanId(r[evvAdm]) : ""
    const name=evvName ? norm(r[evvName]) : ""
    const inv=evvInv ? cleanId(r[evvInv]) : ""
    if(adm) exByAdmDate.add(adm+"|"+date)
    if(name) exByNameDate.add(name+"|"+date)
    if(inv) exByInvDate.add(inv+"|"+date)
    evvRowsUsed++
  })

  const totals={}, unmatched=new Set(), badClaimKeys={}
  const processed=[]
  function ensure(p){if(!totals[p])totals[p]={H:0,K:0,L:0,M:0,excludedClaimDollars:0}}
  let outsideMonth=0, billingRowsUsed=0
  billing.forEach(r=>{
    const name=norm(r[billName])
    const date=cleanDate(r[billDate])
    if(!name||!date)return
    billingRowsUsed++
    if(!isSelectedMonth(date))outsideMonth++
    const med=billMedicaid ? cleanId(r[billMedicaid]) : ""
    const adm=billAdm ? cleanId(r[billAdm]) : ""
    const inv=billInv ? cleanId(r[billInv]) : ""
    let product=(med && productByMedicaid[med]) || productByName[name]
    if(!product){product="MLTCP"; unmatched.add(r[billName] + (med ? " ("+med+")" : ""))}
    const amount=Number(String(r[billAmt]||"0").replace(/[$,]/g,""))||0
    const non=(adm && exByAdmDate.has(adm+"|"+date)) || (inv && exByInvDate.has(inv+"|"+date)) || exByNameDate.has(name+"|"+date)
    ensure(product)
    totals[product].H++
    totals[product].L+=amount
    if(non){totals[product].K++; if(inv)badClaimKeys[product+"|"+inv+"|"+date]=true}
    processed.push({product,date,inv,amount,non})
  })

  processed.forEach(v=>{
    if(v.inv && badClaimKeys[v.product+"|"+v.inv+"|"+v.date]) totals[v.product].excludedClaimDollars += v.amount
  })
  Object.keys(totals).forEach(p=>{totals[p].M=totals[p].L-totals[p].excludedClaimDollars})

  let table="<table><tr><th>Product</th><th>EVV Type</th><th>H Services</th><th>I Matching</th><th>J Rate</th><th>K Non-Compliant</th><th>L Total Dollars</th><th>M Matching Dollars</th></tr>"
  Object.keys(totals).sort().forEach(p=>{
    const t=totals[p], I=t.H-t.K, J=t.H?I/t.H:0
    table+=`<tr><td>${p}</td><td>PC</td><td>${t.H}</td><td>${I}</td><td>${(J*100).toFixed(2)}%</td><td>${t.K}</td><td>${money(t.L)}</td><td>${money(t.M)}</td></tr>`
  })
  table+="</table>"

  show(`<p class="good">Done.</p>
        <p>Billing rows used: ${billingRowsUsed}</p>
        <p>EVV sheet used: ${evv.__sheetName}, header row ${evv.__headerIndex}</p>
        <p>EVV exception rows used for this contract: ${evvRowsUsed}</p>
        <p>EVV rows skipped due to other contracts: ${evvRowsSkippedContract}</p>
        <p>Eligibility rows read: ${elig.length}</p>
        <p class="${outsideMonth?'warn':'good'}">Billing rows outside selected month: ${outsideMonth}</p>
        <p class="warn">Unmatched billing patients defaulted to MLTCP: ${unmatched.size}</p>
        ${unmatched.size ? "<pre>"+Array.from(unmatched).slice(0,100).join("\\n")+"</pre>" : ""}
        <p class="small">Product matching priority: Medicaid Number first, then Patient Name. Exception matching priority: Admission ID + Visit Date, then Invoice Number + Visit Date, then Patient Name + Visit Date. Column M excludes the full invoice/date claim when any row on that claim is non-compliant.</p>`)
  result.innerHTML=table
 }catch(err){
  show("<p class='err'>Error: "+err.message+"</p><pre>"+(err.stack||"")+"</pre>")
 }
}
generateBtn.addEventListener("click",runCalc)
</script>
</body>
</html>
